<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロフィール設定 - 企業分析ツール</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="company.ico">
  <link rel="apple-touch-icon" href="company.ico">
</head>
<body>
  <nav>
    <a href="index.html" class="brand">
      <span class="brand-dot"></span>企業分析ツール
    </a>
    <div class="nav-links">
      <a href="index.html">ホーム</a>
      <a href="profile.html" class="active">プロフィール</a>
    </div>
  </nav>

  <div class="page-header">
    <a href="index.html" class="back-link">← ホームへ</a>
    <div class="page-title-row">
      <h1>プロフィール設定</h1>
    </div>
  </div>

  <div class="container" style="padding-top:0">

    <!-- APIキー -->
    <div class="card">
      <h2>Claude APIキー</h2>
      <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:1rem; font-family:'JetBrains Mono',monospace; letter-spacing:0.02em;">
        <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener" style="color:var(--accent); text-decoration:none;">console.anthropic.com</a>
        からAPIキーを取得できます
      </p>

      <div id="key-status" style="margin-bottom:1rem"></div>

      <div class="form-group" style="margin-bottom:0.875rem">
        <label for="api-key-input">APIキー</label>
        <div class="api-key-wrap">
          <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off">
          <button class="toggle-vis" id="toggle-vis-btn">表示</button>
        </div>
      </div>
      <button class="btn btn-primary" id="save-key-btn">保存</button>
    </div>

    <!-- プロフィール -->
    <div class="card">
      <h2>個人プロフィール</h2>
      <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:1.5rem;">
        入力した内容がマッチング分析・志望動機生成に使われます。一度登録すれば毎回入力不要です。
      </p>

      <div class="form-group">
        <label for="skills">スキル・技術スタック</label>
        <textarea id="skills" placeholder="例：JavaScript, Python, React, AWS, Git..."></textarea>
        <div class="form-hint">// 使える言語・フレームワーク・ツールなど</div>
      </div>

      <div class="form-group">
        <label for="strengths">強み・やりたいこと</label>
        <textarea id="strengths" placeholder="例：ユーザー視点でのUI設計が好き、問題を素早くキャッチアップできる..."></textarea>
      </div>

      <div class="form-group">
        <label for="experiences">経験・実績</label>
        <textarea id="experiences" placeholder="例：個人開発でECサイトを開発・公開、ハッカソン優勝経験..."></textarea>
      </div>

      <div class="form-group">
        <label for="goals">目標・志望</label>
        <textarea id="goals" placeholder="例：toC向けサービスの開発に携わりたい、新しい技術に積極的な環境で成長したい..."></textarea>
      </div>

      <button class="btn btn-primary" id="save-profile-btn">プロフィールを保存</button>
    </div>

  </div>

  <script src="js/storage.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
